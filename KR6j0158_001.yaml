body:
  text: 歸命遍法界塵剎諸如來化相奇特尊最勝佛頂族敬禮大悲者持蓮菩薩衆淨除業障垢廣利諸有情歸依祕密主金剛手藏王從佛受堅牢護持於一切明尊大仙衆聲聞緣覺支天龍蘇藥叉日夜常恭敬是大白傘蓋遍覆於大千神變難思議虛空無障礙諸佛咸稱讚名大佛頂王因此證菩提能轉無上法衆聖同遊學我亦隨順修略撮祕要儀咸願垂加護初吽入道場觀瞻一切佛先以淨三業悟本性無垢身器悉清淨體同諸如來遍滿於虛空運心普敬禮懺悔無邊罪同歸法性空勸請諸如來常住世不滅隨喜人天福廣利益群生回向以一心俱登薩婆若發願此世與當來常得廣行菩薩道淨器界真言曰曩莫薩縛沒馱冒引地薩怛縛二合唵秫入殿努戍引馱曩野娑縛二合賀此大清淨明通用如來部先以作澡灑即結念誦室由誦七遍已身口意三業乃至遍法界一切悉清淨次當普禮一切如來真言曰唵薩縛怛他去引蘖多播引娜滿曩引南迦盧弭由三誦真言運心同法界遍滿微塵剎禮事悉圓滿次懺無始罪障真言曰唵薩縛播波娜賀曩嚩日羅二合野娑縛二合賀由三誦真言懺悔一切咎無間罪如草焚滅盡無餘爾時釋迦牟尼佛告一切菩薩大衆善男子汝等應授一切如來出生三摩地無比力超勝一切如來住真言身一切如來族真實大印真言無比威光神通緣出無邊奇特大威神能生一切菩薩能摧一切俱低魔衆攝伏一切難調之人起於慈心悉能成辦一切事業利益成就今説大印次對本尊結跏趺坐塗香塗手結諸佛菩薩金剛部三昧耶印以手內叉拳禪智並申竪隨句誦真言以印安於頂此一切如來心大印次屈智入掌中是持蓮密印隨句誦真言移安頂右次屈禪入掌却申竪智度一切金剛族所持之密印隨誦真言句移印安頂左一切同一明三部悉具足真言曰曩莫薩縛沒馱冒引地薩怛縛二合南阿去尾羅吽引欠平由結一切如來等大印以大勤勇心真言一切如來真實法加持故悉能解脫地獄傍生焰摩惡趣能令一切有情作如來事攝召一切菩薩聖衆能召諸天梵王帝釋夜摩水天俱尾羅等十地菩薩大自在者尚能請召何況餘次結金剛甲胄護身印二羽結鉤拳左橫仰臍下右鉤摜五處心額肩喉頂隨誦真言曰曩莫三去滿多沒馱南唵部入引入縛二合攞帝惹吽以此甲胄明修行者應用悉印於遍身即成大加護一切佛頂中是印大威德諸魔不陵逼被甲猶如王能成一切事速疾得悉地次應大輪印金剛輪次結無能勝大印明王辟除魔障印應跪右膝竪左膝左手向後作搭勢右拳竪進當於心陵身向前期剋狀真言曰曩莫三去滿多沒馱南唵戶嚕戶嚕戰拏里摩鐙祇研以切娑縛賀無能勝大明是佛之所説能摧一切魔能辟除諸障者大力欲自在世間魔軍王波旬亦自在世天大威德無量俱低魔若欲作障難現作種種狀魔軍恐怖形由結印誦明故自然悉退散當用作加持成就佛頂者於大障礙處常得大加護次結迎請印二羽內叉拳忍願竪申合上節屈如鉤來去成迎請普通奉請一切佛頂王真言曰結印已先於印上置香花擲於壇內然誦真言曩莫引婆去誐縛都塢瑟抳二合澀野翳醯曳呬婆去誐鑁二達摩羅惹鉢羅二合底磋曩摩羅伽二合四巘補澀波二合度波末鄰上左𤚥者劈七羅乞灑二合引鉢羅二合底賀多十麼羅跛羅二合訖羅二合麼也娑縛二合賀引結印三誦明警覺一切佛迎請諸如來悉皆而降赴次結光聚印檀惠並申竪戒方屈跓頭上節忍願倒相合禪智申並直進力屈相跓以押禪智頭旋轉成結界真言誦七遍曩莫三去滿多沒馱南阿鉢羅二合底賀哆捨娑曩南唵引怛他引蘖妬引瑟膩沙阿曩縛路枳多暮㗚二合馱曩帝儒引羅施吽入縛二合攞入縛二合攞馱迦馱迦尾馱迦尾馱迦捺羅二合捺羅尾馱羅二合尾馱羅嚫去娜嚫娜頻娜頻娜吽吽泮吒泮吒娑縛二合賀若用護身即三股金剛杵印是若請召本尊即以杵印股二頭指為鉤來去鉤之即是此大佛頂王號曰光明聚猛焰熾流布如劫火洞然威力難思議能摧壞一切天魔外道衆魔醯濕縛羅大力那羅延并諸餘天類所有種神通力喪滅盡無餘持明大菩薩馬頭明王等聞誦此真言威光如聚點於大佛頂部滅除諸難十二由旬內成大結界地次結辦事印二羽內叉拳忍願申屈合能成辦一切左旋三匝成辟除真言曰曩莫三滿多沒馱南吒嚕吽三合滿馱滿馱吽泮吒娑縛二合賀此辦事真言一切佛頂心由才憶念故水陸諸障者所有欲損害悉皆禁其口結印當於心加持於五處次結蓮華印如敷八葉蓮諸佛如來座至心而奉獻真言誦七遍曩莫薩縛沒馱冒引地薩怛縛二合引南唵吽迦摩攞野娑縛二合賀由此奉獻故諸佛受其座當來剋獲得勝妙金剛座次結奉閼伽廣大真實供泛以香白花誠心而奉獻即以金剛拳忍願竪頭合進力屈背後禪智捻進根真言曰曩莫引婆去誐縛覩瑟抳二合灑野一翳𤚥巘談三補澀波補其反四度喯五末覽六儞半者七鉢羅二合底末瑳八賀羅賀羅九薩縛沒馱十地瑟耻二合帝十一達磨羅引惹十二鉢囉二合底丁以反賀哆野十三娑縛二合賀引由誦此真言奉獻如來故遍於微塵剎成就衆妙供次結佛眼印一切佛頂中應用此大印清淨而受持最勝滅諸罪於諸佛頂王常結於此契決定得悉地不久必成就一切佛頂法設積百劫福若得此印明其福與彼等此佛眼真言能成一切業從十俱胝佛如來所受持由才憶念明一切聖天現一切真言教法皆得成就暴惡瞋怒前應誦得歡喜難調惡鬼神降伏皆隨順鬪戰諍訟處一切得寢淨先後誦七遍速疾成證驗次結金輪佛頂一字王印二羽內叉拳忍願並申合屈上第三節開屈進力頭平等禪智申七遍真言曰曩莫三曼多沒馱南唵𭊘嚕唵三合恆河沙數量如來之所説現在佛今説未來佛當説此印名大印説為頂輪王此印即是佛利益諸有情由明大威德制伏諸賢聖於五由旬內令他尊不降十地諸菩薩迷悶失本心何況餘少類而能現神力智者成就人若此結印處諸惡魔障地是處不敢住於百俱胝劫設於千恆沙如是沙數量亦不能説盡功德及福利稱揚威德力智者若受持常不被沮壞如來大師説而不能讚歎於修佛頂者速疾得成就次結普通一切佛頂成就印二羽內叉拳忍願申而竪以屈相上節普通一切用真言誦七遍印於頂上散曩莫三去滿多沒馱南唵拏嚕唵三合滿馱娑縛二合引賀引由此印如觀覩請佛難調諸藥叉龍及蘇羅衆一切惡羅剎并及諸魔羅由此明威德驚怖悉消融若得此印契能獲諸安樂國王世間等於彼常利益欲求法利者決定而獲得普通真言王成就果報故次結一切佛通覆大千身不見其邊際白傘蓋佛頂王大印或結百億諸佛同心印誦大真言七遍次結白傘蓋根本之大印二手虛心合戒方屈入掌以其禪智面並押戒方甲進力屈令圓是佛傘蓋印真言誦七遍則於頂上散真言曰曩莫三去滿多母馱南阿鉢羅二合底賀哆捨娑曩引南唵怛他引蘖覩瑟抳二合沙阿曩縛路吉多母㗚馱二合斫訖羅二合縛羅二合底唵摩摩吽引䁥儞義反引此大佛頂王殊勝無與等是佛大悲力師子吼流出一切佛加持大悲照憂暗甚深知無垢令作諸吉祥菩薩及諸天而不能沮壞獲得不退轉一切悉安樂衆毒不能傷天龍不敢近書寫及誦持速疾證悉地次持念珠加持七遍捧之頂戴然為念誦百八或千八收珠置本處復結本尊印住於三摩地讚歎佛功德供養如前獻復結三昧耶護身禮佛而退捻珠印以左右二手以禪智各捻戒方甲伸忍願申進力屈於忍願後捻珠而念誦若欲住佛儀而作勇健坐端身結跏趺結佛訖底印左仰掌跏上右外竪掌以禪而押戒甲以進屈忍背後真言誦七遍然入三摩地真言曰曩莫三滿多沒馱南尾惹曳摩賀鑠訖底二合訥馱哩吽泮吒尾惹以儞吽泮吒莽誐梨吽泮吒娑縛二合賀若結此印者不奪其威力今世及他世獲得如來力若誦此真言諸佛皆加護修持佛頂王三時常憶念速疾得成就三界中無礙是大佛頂王密印法無量今為修行者略集少祕要若樂大法者從師求灌頂得授三昧耶應當廣咨學大白傘蓋大佛頂念誦法此法祕密未入灌頂人不得輒聞其修行者取成就若擬自求悉地兼為本尊者輒亦不得傳授與人密印大三昧耶嚴密真言曰唵商上羯哩摩賀引三昧鹽滿馱滿馱娑縛二合賀加持念珠真言曰曩莫婆去誐縛帝素弟娑馱野悉馱羅挮去二合娑縛二合賀淨念珠真言合掌捧珠唵阿娜步二合帝尾惹曳悉地悉馱羅梯二合􅁥時延享元星舍閼逢困敦暮秋十日讎校之壽梓焉大和長谷輪下無等志
